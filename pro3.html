<script>
let globalReportData = {};

document.addEventListener("DOMContentLoaded", () => {
    renderHistoryTags();
});

function calculateSMA(data, idx, period) {
    if (idx < period - 1) return null;
    let sum = 0;
    for (let i = 0; i < period; i++) { sum += data[idx - i]; }
    return Number((sum / period).toFixed(2));
}

function saveToHistory(stockId) {
    let history = JSON.parse(localStorage.getItem("tw_stock_history")) || [];
    if (!history.includes(stockId)) {
        history.unshift(stockId);
        if (history.length > 5) history.pop();
        localStorage.setItem("tw_stock_history", JSON.stringify(history));
        renderHistoryTags();
    }
}

function renderHistoryTags() {
    let history = JSON.parse(localStorage.getItem("tw_stock_history")) || [];
    const box = document.getElementById("history-box");
    box.innerHTML = '<span style="font-size: 12px; font-weight: bold; color: #7f8c8d;">最近查詢：</span>';
    if (history.length === 0) {
        box.innerHTML += '<span style="font-size:12px; color:#bdc3c7;">暫無紀錄</span>';
        return;
    }
    history.forEach(code => {
        box.innerHTML += `<button class="btn-history" onclick="quickSelect('${code}')">${code}</button> `;
    });
}

function quickSelect(code) {
    document.getElementById("stock-code").value = code;
    analyzeTaiwanStock();
}

async function fetchWithFallback(ticker) {
    const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=4mo&interval=1d`;
    const route1 = `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`;
    const route2 = `https://api.allorigins.win/get?url=${encodeURIComponent(yahooUrl)}`;
    const route3 = `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(yahooUrl)}`;

    try {
        const res = await fetch(route1);
        if (!res.ok) throw new Error("R1 流量上限");
        return await res.json();
    } catch (e1) {
        console.warn("⚠️ 第一通道壅塞，切換至第二道防線 (AllOrigins)...");
        try {
            const res2 = await fetch(route2);
            if (!res2.ok) throw new Error("R2 流量上限");
            const rawJson = await res2.json();
            return JSON.parse(rawJson.contents);
        } catch (e2) {
            console.warn("⚠️ 第二通道連線逾時，切換至終極第三道防線 (Codetabs)...");
            try {
                const res3 = await fetch(route3);
                if (!res3.ok) throw new Error("R3 流量上限");
                return await res3.json();
            } catch (e3) {
                throw new Error("全球三道數據代理通道皆陷入極度癱瘓，請稍後再試。");
            }
        }
    }
}

// 🤖 核心回測引擎（已修正變數作用域）
function runBacktest(validData, maShortPeriod, maLongPeriod, paramN) {
    let trades = [];
    let currentTrade = null;
    let logHTML = "";

    const closeArr = validData.map(d => d.close);
    const maShortArr = [];
    const maLongArr = [];
    for (let i = 0; i < validData.length; i++) {
        maShortArr.push(calculateSMA(closeArr, i, maShortPeriod));
        maLongArr.push(calculateSMA(closeArr, i, maLongPeriod));
    }

    for (let i = maLongPeriod; i < validData.length; i++) {
        const today = validData[i];
        const yesterday = validData[i - 1];
        const todayAmp = Number((today.high - today.low).toFixed(2));

        const isBullishToday = today.close > maShortArr[i] && maShortArr[i] > maLongArr[i];
        const isBullishYesterday = yesterday.close > maShortArr[i-1] && maShortArr[i-1] > maLongArr[i-1];

        if (!currentTrade) {
            if (isBullishToday && !isBullishYesterday) {
                currentTrade = {
                    entryDate: today.date,
                    entryPrice: today.close,
                    stopLoss: Number((today.close - (todayAmp * paramN)).toFixed(2)),
                    takeProfit: Number((today.close + (todayAmp * paramN * 2)).toFixed(2)),
                    hasHitTarget: false,
                    maxCloseAfterTarget: today.close,
                    trailingStop: Number((today.close - (todayAmp * paramN)).toFixed(2))
                };
                logHTML += `🟢 <b>[${today.date}]</b> 滿足強勢多頭排列，模擬以收盤價 <b>${today.close}</b> 元進場（初始防守：${currentTrade.stopLoss} 元 / 目標點：${currentTrade.takeProfit} 元）<br>`;
            }
        } else {
            if (!currentTrade.hasHitTarget) {
                if (today.high >= currentTrade.takeProfit) {
                    currentTrade.hasHitTarget = true;
                    currentTrade.maxCloseAfterTarget = Math.max(today.close, currentTrade.entryPrice);
                    const trailOpt = Number((today.close - todayAmp).toFixed(2));
                    currentTrade.trailingStop = Math.max(trailOpt, maShortArr[i] || 0);
                    logHTML += `🎯 <b>[${today.date}]</b> 價格成功衝破目標價 ${currentTrade.takeProfit} 元！<b>啟動移動停利機制</b>，防守點拉高上移至 <b>${currentTrade.trailingStop}</b> 元，讓利潤奔跑。<br>`;
                }
            } else {
                if (today.close > currentTrade.maxCloseAfterTarget) {
                    currentTrade.maxCloseAfterTarget = today.close;
                    const trailOpt = Number((today.close - todayAmp).toFixed(2));
                    const newTrail = Math.max(trailOpt, maShortArr[i] || 0);
                    if (newTrail > currentTrade.trailingStop) {
                        currentTrade.trailingStop = newTrail;
                    }
                }
            }

            if (!currentTrade.hasHitTarget) {
                if (today.close < currentTrade.stopLoss) {
                    let pnlPercent = Number(((today.close - currentTrade.entryPrice) / currentTrade.entryPrice * 100).toFixed(2));
                    logHTML += `❌ <b>[${today.date}]</b> 收盤跌破原始停損點 ${currentTrade.stopLoss} 元，風控出場。模擬損益：<span style="color:var(--success); font-weight:bold;">${pnlPercent}%</span><br>----------------------------------<br>`;
                    currentTrade.exitDate = today.date;
                    currentTrade.exitPrice = today.close;
                    currentTrade.pnl = pnlPercent;
                    currentTrade.result = "LOSS";
                    trades.push(currentTrade);
                    currentTrade = null;
                }
            } else {
                if (today.close < currentTrade.trailingStop) {
                    let pnlPercent = Number(((today.close - currentTrade.entryPrice) / currentTrade.entryPrice * 100).toFixed(2));
                    logHTML += `🚀 <b>[${today.date}]</b> 收盤跌破移動停利防守線 ${currentTrade.trailingStop} 元，獲利全數落袋結清！波段模擬報酬：<span style="color:var(--success); font-weight:bold;">+${pnlPercent}%</span><br>----------------------------------<br>`;
                    currentTrade.exitDate = today.date;
                    currentTrade.exitPrice = today.close;
                    currentTrade.pnl = pnlPercent;
                    currentTrade.result = "WIN";
                    trades.push(currentTrade);
                    currentTrade = null;
                }
            }
        }
    }

    if (currentTrade) {
        let pnlPercent = Number(((validData[validData.length-1].close - currentTrade.entryPrice) / currentTrade.entryPrice * 100).toFixed(2));
        logHTML += `⏳ <b>[續抱中]</b> 截至今日部位仍在場內運行中。目前防守價：<b>${currentTrade.trailingStop}</b> 元，未實現波段回測損益：+${pnlPercent}%<br>`;
    }

    if (trades.length === 0 && !currentTrade) {
        logHTML = "⚠️ 該標的在過去 4 個月內，無任何首度突破且滿足多頭排列的波段進場訊號。";
    }

    const total = trades.length;
    const wins = trades.filter(t => t.result === "WIN").length;
    const losses = trades.filter(t => t.result === "LOSS").length;
    const winRate = total > 0 ? Number((wins / total * 100).toFixed(1)) : 0;
    const totalProfit = trades.reduce((sum, t) => sum + t.pnl, 0);

    return {
        total, wins, losses, winRate, 
        totalProfit: Number(totalProfit.toFixed(2)), 
        logHTML
    };
}

async function analyzeTaiwanStock() {
    const stockId = document.getElementById('stock-code').value.trim().toUpperCase();
    if (!stockId) { alert('請輸入有效的台股代碼！'); return; }

    const paramN = parseFloat(document.getElementById('param-n').value) || 2;
    const maShortPeriod = parseInt(document.getElementById('param-ma-short').value) || 5;
    const maLongPeriod = parseInt(document.getElementById('param-ma-long').value) || 20;

    document.getElementById("th-ma-short").innerText = `${maShortPeriod}日均線`;
    document.getElementById("th-ma-long").innerText = `${maLongPeriod}日均線`;

    const loading = document.getElementById('loading');
    const report = document.getElementById('report-section');
    
    loading.style.display = 'block';
    report.style.display = 'none';

    const ticker = stockId.includes('^') ? stockId : `${stockId}.TW`;

    try {
        const json = await fetchWithFallback(ticker);
        
        if (!json.chart || !json.chart.result || !json.chart.result[0]) {
            throw new Error('代碼錯誤或查無此標的行情');
        }

        const result = json.chart.result[0];
        const timestamps = result.timestamp;
        const closes = result.indicators.quote[0].close;
        const highs = result.indicators.quote[0].high;
        const lows = result.indicators.quote[0].low;

        let validData = [];
        for (let i = 0; i < closes.length; i++) {
            if (closes[i] !== null && highs[i] !== null && lows[i] !== null) {
                let dateObj = new Date(timestamps[i] * 1000);
                let dateString = `${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}-${String(dateObj.getDate()).padStart(2,'0')}`;
                validData.push({
                    date: dateString,
                    close: Number(closes[i].toFixed(2)),
                    high: Number(highs[i].toFixed(2)),
                    low: Number(lows[i].toFixed(2))
                });
            }
        }

        if (validData.length < maLongPeriod) throw new Error(`數據量不足以計算 ${maLongPeriod} 日均線`);

        const len = validData.length;
        const closeArr = validData.map(d => d.close);

        const currentClose = validData[len - 1].close;
        const currentHigh = validData[len - 1].high;
        const currentLow = validData[len - 1].low;
        const currentAmplitude = Number((currentHigh - currentLow).toFixed(2)); 

        const maShort = calculateSMA(closeArr, len - 1, maShortPeriod);
        const maLong = calculateSMA(closeArr, len - 1, maLongPeriod);

        let isBullish = false;
        if (maShort && maLong) { isBullish = currentClose > maShort && maShort > maLong; }

        const stopLoss = Number((currentClose - (currentAmplitude * paramN)).toFixed(2));
        const takeProfit = Number((currentClose + (currentAmplitude * paramN * 2)).toFixed(2));

        let trailingStopPrice = stopLoss; 
        let navigationStatus = "SAFE";    
        let adviceText = "";

        if (currentClose >= takeProfit) {
            const trailOption1 = Number((currentClose - currentAmplitude).toFixed(2));
            trailingStopPrice = Math.max(trailOption1, maShort || 0);
            
            if (currentClose > (takeProfit * 1.1)) {
                navigationStatus = "MOON";
                adviceText = "🔥 【飆股續抱提示】價格已遠超波段預期！多頭動能極強，請完全採用「今日實戰防守價（移動停利）」，收盤未跌破前，讓利潤無限制狂飆！";
            } else {
                navigationStatus = "TARGET";
                adviceText = "🎯 【獲利滿足提示】價格已成功觸及目標區！建議可先分批落袋 1/3 鎖定利潤。其餘持股已自動啟動「移動停利機制」，抱緊博取更大波段！";
            }
        } else {
            navigationStatus = "SAFE";
            adviceText = isBullish ? "🟢 均線呈多頭排列，目前屬於安全蓄勢上漲區，未達目標價前請安心持股，緊盯原始動態停損點即可。" : "⚖️ 趨勢偏弱或處於盤整震盪，未滿足進場訊號，建議保持觀望。";
        }

        // 🤖 執行回測（傳入正確定義的 maLongPeriod）
        const btResult = runBacktest(validData, maShortPeriod, maLongPeriod, paramN);

        globalReportData = {
            stockId, currentClose, maShort, maLong, currentAmplitude, stopLoss, takeProfit, isBullish, paramN,
            trailingStopPrice, navigationStatus, adviceText,
            historyRows: validData.slice(-5).reverse(), 
            maShortPeriod, maLongPeriod, closeArr, len
        };

        if (!stockId.includes('^')) saveToHistory(stockId);

        loading.style.display = 'none';
        report.style.display = 'block';

        document.getElementById("bt-total").innerText = `${btResult.total} 次`;
        document.getElementById("bt-wins").innerText = `${btResult.wins} 次`;
        document.getElementById("bt-losses").innerText = `${btResult.losses} 次`;
        document.getElementById("bt-winrate").innerText = `${btResult.winRate} %`;
        
        const profitBox = document.getElementById("bt-profit");
        if(btResult.totalProfit >= 0) {
            profitBox.innerText = `+${btResult.totalProfit} %`;
            profitBox.style.color = "var(--success)";
        } else {
            profitBox.innerText = `${btResult.totalProfit} %`;
            profitBox.style.color = "var(--danger)";
        }
        document.getElementById("backtest-log").innerHTML = btResult.logHTML;

        document.getElementById("nav-step-safe").className = "nav-light-step" + (navigationStatus === "SAFE" ? " active-safe" : "");
        document.getElementById("nav-step-target").className = "nav-light-step" + (navigationStatus === "TARGET" ? " active-target" : "");
        document.getElementById("nav-step-moon").className = "nav-light-step" + (navigationStatus === "MOON" ? " active-moon" : "");

        const signalCard = document.getElementById('signal-card');
        const strategySignal = document.getElementById('strategy-signal');

        if (isBullish) {
            signalCard.className = "card signal-card-bullish";
            strategySignal.className = "signal-box text-bullish";
            strategySignal.innerText = `🚀 強勢多頭排列：價格 > MA${maShortPeriod} > MA${maLongPeriod}`;
        } else {
            signalCard.className = "card signal-card-neutral";
            strategySignal.className = "signal-box";
            strategySignal.style.color = "#7f8c8d";
            strategySignal.innerText = `⚖️ 趨勢非多頭排列 (建議保持觀望)`;
        }

        document.getElementById('technical-data').innerHTML = `
            • <b>當前收盤/點數：</b> <span class="highlight text-bullish">${currentClose}</span> 元/點<br>
            • <b>${maShortPeriod}日均線價位：</b> <span class="${currentClose > maShort ? 'text-bullish' : ''}">${maShort}</span> 元<br>
            • <b>${maLongPeriod}日均線價位：</b> ${maLong} 元<br>
            • <b>當日真實振幅 (高-低)：</b> <span class="text-bullish">${currentAmplitude}</span> 元 (最高 ${currentHigh} / 最低 ${currentLow})
        `;

        let riskHTML = `
            • <b>設定風控倍數 (N)：</b> ${paramN} 倍<br>
            • <b>原始動態停損價：</b> <span style="color:#7f8c8d; font-weight:bold;">${stopLoss} 元</span> (剛進場防守線)<br>
            • <b>波段預期停利點：</b> <span class="text-danger" style="font-weight:bold;">${takeProfit} 元</span> (1:2 盈虧比)<br>
            <div style="margin-top:10px; padding-top:10px; border-top:2px dashed #bdc3c7;">
                • <b>🚨 今日實戰防守價：</b> <span class="text-bullish highlight" style="font-size:1.4em;">${trailingStopPrice} 元</span><br>
                <small style="color:#555; display:block; margin-top:4px;">💡 ${navigationStatus === 'SAFE' ? '價格尚未達標，採用原始停損守住本金。' : '<b>已啟動移動停利！</b> 盤後收盤價未跌破此防守價，持股就抱緊。'}</small>
            </div>
            <div style="margin-top:10px; font-size:13px; font-weight:bold; line-height:1.4; color:#2c3e50; background:#f8f9fa; padding:8px; border-radius:4px;">
                ${adviceText}
            </div>
        `;
        document.getElementById('risk-data').innerHTML = riskHTML;

        const tbody = document.querySelector('#details-table tbody');
        tbody.innerHTML = '';
        
        let displayRows = validData.slice(-5).reverse();
        displayRows.forEach((row, i) => {
            let actualIdx = (len - 1) - i;
            let amp = Number((row.high - row.low).toFixed(2));
            let mShort = calculateSMA(closeArr, actualIdx, maShortPeriod) || '-';
            let mLong = calculateSMA(closeArr, actualIdx, maLongPeriod) || '-';
            
            tbody.innerHTML += `
                <tr>
                    <td>${row.date}</td>
                    <td><b class="text-bullish">${row.close}</b></td>
                    <td>${row.high}</td>
                    <td>${row.low}</td>
                    <td>${amp}</td>
                    <td>${mShort}</td>
                    <td>${mLong}</td>
                </tr>
            `;
        });

    } catch (error) {
        loading.style.display = 'none';
        alert('策略計算失敗，原因: ' + error.message);
    }
}

function copyStrategyToClipboard() {
    if (!globalReportData.stockId) return;
    const d = globalReportData;
    let zoneText = "安全蓄勢區";
    if (d.navigationStatus === "TARGET") zoneText = "利潤滿足區 (分批停利)";
    if (d.navigationStatus === "MOON") zoneText = "瘋狂主升飆股區 (利潤奔跑)";

    const textToCopy = `【台股波段決策報告 - ${d.stockId}】\n今日收盤價：${d.currentClose} 元\n當前所處區域：${zoneText}\n單日真實振幅：${d.currentAmplitude} 元\n------------------------\n🛡️ 原始進場停損：${d.stopLoss} 元\n🎯 預期波段目標：${d.takeProfit} 元\n🚨 今日實戰防守價（移動停利）：${d.trailingStopPrice} 元\n\n💡 實戰指引：${d.adviceText.replace(/<[^>]*>/g, '')}`;
    
    navigator.clipboard.writeText(textToCopy).then(() => {
        alert("📊 三防線回測完全體報告已成功複製！");
    }).catch(err => {
        alert("複製失敗: " + err);
    });
}

function exportToCSV() {
    if (!globalReportData.stockId) return;
    const d = globalReportData;
    let csvContent = "\uFEFF"; 
    csvContent += `日期,收盤價,最高價,最低價,單日振幅,${d.maShortPeriod}日均線,${d.maLongPeriod}日均線\n`;
    
    d.historyRows.forEach((row, i) => {
        let actualIdx = (d.len - 1) - i;
        let amp = Number((row.high - row.low).toFixed(2));
        let mShort = calculateSMA(d.closeArr, actualIdx, d.maShortPeriod) || '-';
        let mLong = calculateSMA(d.closeArr, actualIdx, d.maLongPeriod) || '-';
        csvContent += `${row.date},${row.close},${row.high},${row.low},${amp},${mShort},${mLong}\n`;
    });

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.setAttribute("href", url);
    link.setAttribute("download", `台股完全體回測_${d.stockId}_5日數據.csv`);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>
