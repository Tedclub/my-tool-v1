<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股個股策略決策與動態風控儀表板</title>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #e74c3c; /* 台股多頭用紅 */
            --danger: #2ecc71;  /* 台股空頭用綠 */
            --dark: #34495e;
            --light: #f8f9fa;
        }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #f0f3f4; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        header { text-align: center; border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 25px; }
        
        /* 控制區 */
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border: 2px solid #bdc3c7; border-radius: 6px; font-size: 16px; font-weight: bold; }
        input:focus { border-color: var(--primary); outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; }
        button:hover { background: var(--dark); }

        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }

        /* 策略輸出欄位 */
        .signal-box { font-size: 24px; font-weight: bold; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        .bullish { background: rgba(231, 76, 60, 0.1); color: var(--success); border: 2px solid var(--success); }
        .neutral { background: #e5e8e8; color: #7f8c8d; border: 2px solid #bdc3c7; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #e5e8e8; }
        th { background: var(--light); color: var(--dark); }
        .loading { text-align: center; font-size: 18px; color: #7f8c8d; display: none; padding: 20px; }
        .highlight { font-weight: bold; font-size: 1.1em; color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>台股均線排列與動態振幅策略決策工具</h1>
        <p>直接輸入股票代號・純前端 JavaScript 計算・免 Python 環境</p>
    </header>

    <div class="card">
        <h3>第一步：請輸入台股個股代號</h3>
        <div class="search-box">
            <input type="text" id="stock-code" value="2330" placeholder="請輸入股票代碼，例如: 2330, 2317, 2454...">
            <button onclick="analyzeTaiwanStock()">即時計算策略數據</button>
        </div>
        <div id="loading" class="loading">正在請求最新台股行情並計算多頭排列與振幅風控點位，請稍候...</div>
    </div>

    <div id="report-section" style="display: none;">
        <div class="card">
            <h3>第二步：台股新策略決策輸出</h3>
            <div id="strategy-signal" class="signal-box"></div>
            
            <div class="grid">
                <div>
                    <h4>📊 均線排列與單日振幅數據</h4>
                    <p id="technical-data" style="line-height: 2;"></p>
                </div>
                <div>
                    <h4>💼 2倍振幅動態風控引導 (N = 2)</h4>
                    <p id="risk-data" style="line-height: 2; background: var(--light); padding: 15px; border-radius: 6px;"></p>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>第三步：最近 5 日台股行情與真實振幅明細表</h3>
            <table id="details-table">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>收盤價</th>
                        <th>最高價</th>
                        <th>最低價</th>
                        <th>單日振幅 (高-低)</th>
                        <th>5日均線 (MA5)</th>
                        <th>20日均線 (MA20)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// 移動平均線計算函式
function calculateSMA(data, idx, period) {
    if (idx < period - 1) return null;
    let sum = 0;
    for (let i = 0; i < period; i++) {
        sum += data[idx - i];
    }
    return Number((sum / period).toFixed(2));
}

async function analyzeTaiwanStock() {
    const stockId = document.getElementById('stock-code').value.trim();
    if (!stockId) { alert('請輸入有效的台股代碼！'); return; }

    const loading = document.getElementById('loading');
    const report = document.getElementById('report-section');
    
    loading.style.display = 'block';
    report.style.display = 'none';

    try {
        // 使用不限 CORS 跨網域阻擋的公開財經 K 線節點 (支援台股格式: 代號.TW)
        const response = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${stockId}.TW?range=2mo&interval=1d`);
        if (!response.ok) throw new Error('代碼錯誤或伺服器無回應');
        
        const json = await response.json();
        const result = json.chart.result[0];
        
        if (!result || !result.indicators.quote[0].close) {
            throw new Error('查無此股票行情資料');
        }

        const timestamps = result.timestamp;
        const closes = result.indicators.quote[0].close;
        const highs = result.indicators.quote[0].high;
        const lows = result.indicators.quote[0].low;

        // 清理無效或空數據
        let validData = [];
        for (let i = 0; i < closes.length; i++) {
            if (closes[i] !== null && highs[i] !== null && lows[i] !== null) {
                let dateObj = new Date(timestamps[i] * 1000);
                let dateString = `${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}-${String(dateObj.getDate()).padStart(2,'0')}`;
                validData.push({
                    date: dateString,
                    close: Number(closes[i].toFixed(2)),
                    high: Number(highs[i].toFixed(2)),
                    low: Number(lows[i].toFixed(2))
                });
            }
        }

        const len = validData.length;
        const closeArr = validData.map(d => d.close);

        // 1. 計算最新一日的指標
        const currentClose = validData[len - 1].close;
        const currentHigh = validData[len - 1].high;
        const currentLow = validData[len - 1].low;
        
        // 要求點 2：完全取代 ATR 複雜公式，直接計算「單日振幅 (高-低)」
        const currentAmplitude = Number((currentHigh - currentLow).toFixed(2)); 

        const ma5 = calculateSMA(closeArr, len - 1, 5);
        const ma20 = calculateSMA(closeArr, len - 1, 20);

        // 要求點 4：策略核心邏輯改為 價格 > MA5 > MA20 (均線多頭排列)
        let isBullish = false;
        if (ma5 && ma20) {
            isBullish = currentClose > ma5 && ma5 > ma20;
        }

        // 訊號狀態判定
        let signalText = "";
        let signalClass = "";

        if (isBullish) {
            signalText = "🚀 強勢多頭排列：價格 > MA5 > MA20 (滿足波段進場)";
            signalClass = "bullish";
        } else {
            signalText = "⚖️ 趨勢非多頭：未滿足多頭排列條件 (建議觀望)";
            signalClass = "neutral";
        }

        // 要求點 3：2 倍振幅動態風控計算
        const N = 2;
        const stopLoss = Number((currentClose - (currentAmplitude * N)).toFixed(2)); // 收盤價 - N倍振幅
        const takeProfit = Number((currentClose + (currentAmplitude * N * 2)).toFixed(2)); // 盈虧比 1:2 參考點

        // 2. 渲染策略數據面板
        loading.style.display = 'none';
        report.style.display = 'block';

        document.getElementById('strategy-signal').className = `signal-box ${signalClass}`;
        document.getElementById('strategy-signal').innerText = signalText;

        document.getElementById('technical-data').innerHTML = `
            • <b>當前收盤價：</b> <span class="highlight">${currentClose}</span> 元<br>
            • <b>5日均線均價 (MA5)：</b> ${ma5} 元<br>
            • <b>20日均線均價 (MA20)：</b> ${ma20} 元<br>
            • <b>當日真實振幅 (高 - 低)：</b> ${currentAmplitude} 元 (最高 ${currentHigh} / 最低 ${currentLow})
        `;

        document.getElementById('risk-data').innerHTML = `
            • <b>動態風控乘數 (N)：</b> ${N} 倍<br>
            • <b>參考動態停損價：</b> <span style="color:#e74c3c; font-weight:bold;">${stopLoss} 元</span> (當前收盤價 - ${N}倍振幅)<br>
            • <b>參考波段停利點：</b> <span style="color:#2ecc71; font-weight:bold;">${takeProfit} 元</span> (當前收盤價 + ${N*2}倍振幅)
        `;

        // 3. 填寫最近 5 日細節明細
        const tbody = document.querySelector('#details-table tbody');
        tbody.innerHTML = '';
        let count = 0;
        for (let i = len - 1; i >= 0; i--) {
            if (count >= 5) break;
            let amp = Number((validData[i].high - validData[i].low).toFixed(2));
            let m5 = calculateSMA(closeArr, i, 5) || '-';
            let m20 = calculateSMA(closeArr, i, 20) || '-';
            
            tbody.innerHTML += `
                <tr>
                    <td>${validData[i].date}</td>
                    <td><b>${validData[i].close}</b></td>
                    <td>${validData[i].high}</td>
                    <td>${validData[i].low}</td>
                    <td>${amp}</td>
                    <td>${m5}</td>
                    <td>${m20}</td>
                </tr>
            `;
            count++;
        }

    } catch (error) {
        loading.style.display = 'none';
        alert('策略計算失敗，請確認代碼是否正確。錯誤原因: ' + error.message);
    }
}
</script>

</body>
</html>
