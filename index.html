<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>強勢多頭排列防守導航儀</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f7fa; color: #2c3e50; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #e74c3c; font-size: 24px; margin-bottom: 25px; }
        
        /* 頂部三大狀態燈號區 */
        .status-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 25px; }
        .status-box { background-color: #e2e8f0; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 14px; color: #64748b; border: 2px solid #cbd5e1; transition: all 0.3s; }
        
        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; background: #f8f9fa; padding: 20px; border-radius: 8px; }
        .input-box { display: flex; flex-direction: column; }
        .input-box label { font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #34495e; }
        .input-box input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        button { background: #1abc9c; color: #fff; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; transition: background 0.2s; }
        button:hover { background: #16a085; }
        
        /* 🚀 動態歷史標籤樣式 */
        .quick-links { margin-top: 10px; font-size: 13px; display: flex; flex-wrap: wrap; gap: 6px; }
        .quick-btn { background: #ebdcb9; color: #333; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; transition: background 0.2s; }
        .quick-btn:hover { background: #dfceaa; }
        
        #loading { display: none; text-align: center; font-weight: bold; color: #e67e22; margin: 20px 0; }
        #report-section { display: none; margin-top: 25px; }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media(max-width: 768px) { .report-grid { grid-template-columns: 1fr; } }
        .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .card h3 { margin-top: 0; border-bottom: 2px solid #ecf0f1; padding-bottom: 8px; color: #2c3e50; font-size: 16px; }
        .highlight { font-size: 20px; font-weight: bold; }
        .text-bullish { color: #e74c3c; font-weight: bold; }
        .text-danger { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 強勢多頭排列防守導航儀</h1>
    
    <div style="text-align: center; margin-top: -15px; margin-bottom: 25px;">
        <a href="https://github.com/tedclub/my-tool-v1/blob/main/README.md" 
           target="_blank" 
           rel="noopener noreferrer" 
           style="display: inline-block; padding: 6px 14px; font-size: 13px; font-weight: bold; color: #ebdcb9; background-color: #2c3e50; text-decoration: none; border-radius: 4px; transition: background 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
           📖 開啟操盤手說明書 (README)
        </a>
    </div>
    
    <div class="status-container">
        <div id="status-1" class="status-box">🟢 安全蓄勢區<br>(未達目標價)</div>
        <div id="status-2" class="status-box">🔥 利潤首要滿足點<br>(建議分批落袋 1/3)</div>
        <div id="status-3" class="status-box">🚀 瘋狂主升飆股區<br>(啟動 移動停利)</div>
    </div>
    
    <div class="input-group">
        <div class="input-box" style="grid-column: span 1;">
            <label>股票代碼</label>
            <input type="text" id="stock-code" value="0050" placeholder="例如: 2344">
            <div class="quick-links" id="history-tags"></div>
        </div>
        <div class="input-box">
            <label>風控乘數 (Param N)</label>
            <input type="number" id="param-n" value="2" step="0.1">
        </div>
        <div class="input-box">
            <label>短均線天數 (R採計週期)</label>
            <input type="number" id="param-ma-short" value="5">
        </div>
        <div class="input-box">
            <label>長均線天數</label>
            <input type="number" id="param-ma-long" value="20">
        </div>
    </div>

    <button onclick="analyzeTaiwanStock()">🎯 開始動態風控計算</button>

    <div id="loading">📡 正在直連雲端後端抓取歷史 K 線數據...</div>

    <div id="report-section">
        <div class="report-grid">
            <div class="card">
                <h3 id="report-title-left">📊 均線排列與週期振幅數據</h3>
                <div id="technical-data" style="line-height: 2;"></div>
            </div>
            <div class="card">
                <h3 id="report-title-right">💼 動態風控與移動停利導航面板</h3>
                <div id="risk-data" style="line-height: 2;"></div>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
