<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>強勢多頭排列防守導航儀：實戰操作手冊</title>
    <!-- 引進 Markdown 渲染庫 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f7fa; color: #2c3e50; margin: 0; padding: 20px; line-height: 1.7; }
        .container { max-width: 850px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1, h2, h3 { color: #2c3e50; border-bottom: 1px solid #ecf0f1; padding-bottom: 8px; margin-top: 30px; }
        h1 { color: #e74c3c; border-bottom: 2px solid #e74c3c; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 14px; }
        th, td { border: 1px solid #cbd5e1; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; font-weight: bold; }
        blockquote { background: #fffaf0; border-left: 4px solid #e67e22; padding: 15px; margin: 20px 0; border-radius: 4px; font-style: italic; }
        pre, code { background: #f1f5f9; padding: 3px 6px; border-radius: 4px; font-family: monospace; font-size: 14px; }
        .back-btn { display: inline-block; margin-bottom: 20px; padding: 8px 16px; background: #2c3e50; color: #fff; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">⬅️ 返回導航儀面板</a>
    <div id="content">📡 正在載入操盤說明書...</div>
</div>

<script>
    // 自動抓取專案裡的 README.md 並動態渲染成漂亮的網頁
    fetch('README.md')
        .then(response => response.text())
        .then(text => {
            document.getElementById('content').innerHTML = marked.parse(text);
        })
        .catch(err => {
            document.getElementById('content').innerHTML = "說明書載入失敗，請確認 README.md 是否存在。";
        });
</script>
</body>
</html>
